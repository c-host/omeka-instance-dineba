# Copy to compose.override.yaml in your Ghent Docker clone (upstream does not ship this file).
# Replaces the default named volume with a host directory so Omeka data is visible under ./data/omeka.
# Also copies Georgian ka.mo into the core language directory on container start.

services:
  omeka:
    volumes:
      - ./data/omeka:/volume
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        if [ -f /volume/i18n/ka.mo ]; then
          cp /volume/i18n/ka.mo /var/www/omeka-s/application/language/ka.mo
          chmod 644 /var/www/omeka-s/application/language/ka.mo
          echo "Installed Georgian locale: /var/www/omeka-s/application/language/ka.mo"
        fi
        exec /entrypoint supervisord